<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#000"/>
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)" stroke="#22d3ee" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer Z -->
    <polyline points="34,38 166,38 34,162 166,162" stroke-width="5" opacity="0.4"/>
    <!-- Mid-outer Z -->
    <polyline points="42,47 158,47 42,153 158,153" stroke-width="4" opacity="0.6"/>
    <!-- Mid Z -->
    <polyline points="50,56 150,56 50,144 150,144" stroke-width="3.5" opacity="0.8"/>
    <!-- Mid-inner Z -->
    <polyline points="58,65 142,65 58,135 142,135" stroke-width="3" opacity="0.9"/>
    <!-- Inner Z -->
    <polyline points="66,74 134,74 66,126 134,126" stroke-width="2.5" opacity="1"/>
  </g>
</svg>
